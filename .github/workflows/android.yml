name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # यहाँ v4 कर दिया

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # यहाँ v4 कर दिया
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # यहाँ v4 कर दिया
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

